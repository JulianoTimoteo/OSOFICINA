<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Seed Fertirrigação</title>
  <style>
    body {
      font-family: monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 20px;
    }
    h1 { color: #00d4aa; margin-bottom: 0; }
    p  { color: #888; margin-top: 4px; }
    button {
      background: #00d4aa;
      color: #1a1a2e;
      border: none;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #log {
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 8px;
      width: 100%;
      max-width: 800px;
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      font-size: 13px;
      line-height: 1.8;
    }
    .ok   { color: #22c55e; }
    .warn { color: #f97316; }
    .err  { color: #ef4444; }
    .info { color: #3b82f6; }
    .done { color: #00d4aa; font-weight: bold; font-size: 15px; }
  </style>
</head>
<body>

  <h1>🌱 Seed — Sistema Fertirrigação</h1>
  <p>Popula todas as coleções do Firestore de uma vez.</p>

  <button id="btnSeed" onclick="runSeed()">
    🚀 Criar Estrutura no Firestore
  </button>

  <div id="log"></div>

  <!-- Firebase SDK via CDN -->
  <script type="module">
    import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // ─── Config do seu projeto ────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyDetEZeOg14RHHRgBEWI5YKyYM5P29a6U8",
      authDomain:        "fertirrigacao-a9b35.firebaseapp.com",
      projectId:         "fertirrigacao-a9b35",
      storageBucket:     "fertirrigacao-a9b35.firebasestorage.app",
      messagingSenderId: "1014081355154",
      appId:             "1:1014081355154:web:26caa20332cb51fb69d54b",
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    const now  = () => Timestamp.now();

    // ─── Logger visual ────────────────────────────────────────────
    function log(msg, tipo = "ok") {
      const el   = document.getElementById("log");
      const line = document.createElement("div");
      line.className = tipo;
      line.textContent = msg;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    async function write(colecao, id, dados) {
      await setDoc(doc(db, colecao, id), dados, { merge: true });
      log(`✅ ${colecao}/${id}`, "ok");
    }

    // ─── Seed principal ───────────────────────────────────────────
    async function runSeed() {
      const btn = document.getElementById("btnSeed");
      btn.disabled = true;
      document.getElementById("log").innerHTML = "";
      log("🔐 Autenticando no Firebase...", "info");

      try {
        // Login como admin para ter permissão de escrita
        // (crie esse usuário no Firebase Auth Console primeiro)
        await signInWithEmailAndPassword(auth, "admin@usina.com", "Admin@123");
        log("🔐 Autenticado com sucesso!", "info");
      } catch (e) {
        log("⚠️  Auth falhou — tentando sem login (modo dev)...", "warn");
        log("   Se der erro de permissão, crie admin@usina.com no Auth Console", "warn");
      }

      try {

        // ══════════════════════════════════════════════════════════
        // 1. UNITS
        // ══════════════════════════════════════════════════════════
        log("\n📦 Criando: units", "info");

        await write("units", "unit_001", {
          name:       "Usina São João",
          code:       "USJ",
          active:     true,
          created_at: now(),
        });

        // ══════════════════════════════════════════════════════════
        // 2. EQUIPMENT_TYPES
        // ══════════════════════════════════════════════════════════
        log("\n📦 Criando: equipment_types", "info");

        await write("equipment_types", "CAMINHAO", {
          name: "Caminhão", code: "CAMINHAO", sort_order: 1,
        });
        await write("equipment_types", "TRATOR", {
          name: "Trator/Bomba", code: "TRATOR", sort_order: 2,
        });
        await write("equipment_types", "CARRETA", {
          name: "Carreta", code: "CARRETA", sort_order: 3,
        });

        // ══════════════════════════════════════════════════════════
        // 3. STATUS_TYPES
        // ══════════════════════════════════════════════════════════
        log("\n📦 Criando: status_types", "info");

        const statuses = [
          { id: "CHEGADA",
            code: "CHEGADA", display_name: "Chegada",
            default_color: "#22C55E", default_sla_sec: 900,
            is_active: true, sort_order: 1 },

          { id: "PARADA",
            code: "PARADA", display_name: "Parada",
            default_color: "#EF4444", default_sla_sec: 600,
            is_active: true, sort_order: 2 },

          { id: "DESCARREGANDO",
            code: "DESCARREGANDO", display_name: "Descarregando",
            default_color: "#F97316", default_sla_sec: 900,
            is_active: true, sort_order: 3 },

          { id: "DESLOCAMENTO_CARREGADO",
            code: "DESLOCAMENTO_CARREGADO",
            display_name: "Deslocamento Carregado",
            default_color: "#3B82F6", default_sla_sec: 1800,
            is_active: true, sort_order: 4 },

          { id: "DESLOCAMENTO_VAZIO",
            code: "DESLOCAMENTO_VAZIO",
            display_name: "Deslocamento Vazio",
            default_color: "#6B7280", default_sla_sec: 1200,
            is_active: true, sort_order: 5 },
        ];

        for (const s of statuses) {
          await write("status_types", s.id, s);
        }

        // ══════════════════════════════════════════════════════════
        // 4. WORK_FRONTS
        // ══════════════════════════════════════════════════════════
        log("\n📦 Criando: work_fronts", "info");

        const fronts = [
          { id: "front_001", name: "Frente A", code: "FR-A", description: "Setor Norte" },
          { id: "front_002", name: "Frente B", code: "FR-B", description: "Setor Sul"  },
          { id: "front_003", name: "Frente C", code: "FR-C", description: "Setor Leste"},
          { id: "front_004", name: "Frente D", code: "FR-D", description: "Setor Oeste"},
        ];

        for (const f of fronts) {
          await write("work_fronts", f.id, {
            unit_id:     "unit_001",
            name:        f.name,
            code:        f.code,
            description: f.description,
            is_active:   true,
            created_at:  now(),
            updated_at:  now(),
          });
        }

        // ══════════════════════════════════════════════════════════
        // 5. WORK_FRONT_ASSIGNMENTS
        // ══════════════════════════════════════════════════════════
        log("\n📦 Criando: work_front_assignments", "info");

        const assignments = [
          {
            id: "assign_001", work_front_id: "front_001",
            os_code: "OS-2025-001", block_code: "BL-07",
            release_code: "LIB-042", talhao_code: "T-18",
          },
          {
            id: "assign_002", work_front_id: "front_002",
            os_code: "OS-2025-002", block_code: "BL-11",
            release_code: "LIB-051", talhao_code: "T-03",
          },
          {
            id: "assign_003", work_front_id: "front_003",
            os_code: "OS-2025-003", block_code: "BL-22",
            release_code: "LIB-061", talhao_code: "T-09",
          },
          {
            id: "assign_004", work_front_id: "front_004",
            os_code: "OS-2025-004", block_code: "BL-05",
            release_code: "LIB-033", talhao_code: "T-15",
          },
        ];

        for (const a of assignments) {
          await write("work_front_assignments", a.id, {
            work_front_id: a.work_front_id,
            os_code:       a.os_code,
            block_code:    a.block_code,
            release_code:  a.release_code,
            talhao_code:   a.talhao_code,
            valid_from:    now(),
            valid_to:      null,
            created_by:    "SYSTEM_SEED",
            created_at:    now(),
          });
        }

        // ══════════════════════════════════════════════════════════
        // 6. STATUS_CONFIGS (overrides por unidade)
        // ══════════════════════════════════════════════════════════
        log("\n📦 Criando: status_configs", "info");

        await write("status_configs", "cfg_unit001_parada_caminhao", {
          unit_id:           "unit_001",
          status_type_id:    "PARADA",
          equipment_type_id: "CAMINHAO",
          color_hex:         "#FF0000",
          sla_sec:           300,
        });

        await write("status_configs", "cfg_unit001_descar_carreta", {
          unit_id:           "unit_001",
          status_type_id:    "DESCARREGANDO",
          equipment_type_id: "CARRETA",
          color_hex:         "#F97316",
          sla_sec:           600,
        });

        // ══════════════════════════════════════════════════════════
        // 7. EQUIPMENTS + status_logs iniciais
        // ══════════════════════════════════════════════════════════
        log("\n📦 Criando: equipments + status_logs", "info");

        const equipments = [
          {
            id: "equip_001", equipment_type_id: "CAMINHAO",
            identifier: "ABC-1234", description: "Caminhão Pipa 01",
            current_status: "DESLOCAMENTO_CARREGADO",
            current_front_id: "front_001", sla_seconds: 1800,
          },
          {
            id: "equip_002", equipment_type_id: "CAMINHAO",
            identifier: "DEF-5678", description: "Caminhão Pipa 02",
            current_status: "CHEGADA",
            current_front_id: "front_001", sla_seconds: 900,
          },
          {
            id: "equip_003", equipment_type_id: "TRATOR",
            identifier: "TR-045", description: "Trator Bomba 045",
            current_status: "PARADA",
            current_front_id: "front_002", sla_seconds: 600,
          },
          {
            id: "equip_004", equipment_type_id: "TRATOR",
            identifier: "TR-067", description: "Trator Bomba 067",
            current_status: "DESCARREGANDO",
            current_front_id: "front_002", sla_seconds: 900,
          },
          {
            id: "equip_005", equipment_type_id: "CARRETA",
            identifier: "CRT-011", description: "Carreta 011",
            current_status: "DESLOCAMENTO_VAZIO",
            current_front_id: "front_003", sla_seconds: 1200,
          },
          {
            id: "equip_006", equipment_type_id: "CARRETA",
            identifier: "CRT-022", description: "Carreta 022",
            current_status: "DESLOCAMENTO_CARREGADO",
            current_front_id: "front_004", sla_seconds: 1800,
          },
        ];

        for (const e of equipments) {
          // Documento principal do equipamento
          await write("equipments", e.id, {
            unit_id:           "unit_001",
            equipment_type_id: e.equipment_type_id,
            identifier:        e.identifier,
            description:       e.description,
            is_active:         true,
            telemetry_id:      null,
            created_at:        now(),
            current_status:    e.current_status,
            current_front_id:  e.current_front_id,
            status_started_at: now(),
            sla_seconds:       e.sla_seconds,
            is_alarm_active:   false,
          });

          // Log inicial na subcoleção
          await setDoc(
            doc(db, "equipments", e.id, "status_logs", `log_${e.id}_init`),
            {
              work_front_id:  e.current_front_id,
              status_type_id: e.current_status,
              started_at:     now(),
              ended_at:       null,
              duration_sec:   null,
              created_by:     "SYSTEM_SEED",
              notes:          "Status inicial — seed",
            },
            { merge: true }
          );
          log(`   ↳ status_logs/log_${e.id}_init criado`, "ok");
        }

        // ══════════════════════════════════════════════════════════
        // 8. USERS (perfis — senha via Firebase Auth Console)
        // ══════════════════════════════════════════════════════════
        log("\n📦 Criando: users", "info");

        const users = [
          {
            id: "user_admin_demo",
            name: "Administrador Demo", email: "admin@usina.com",
            role: "ADMIN",
          },
          {
            id: "user_operador_demo",
            name: "Operador Demo", email: "operador@usina.com",
            role: "OPERADOR",
          },
          {
            id: "user_gestor_demo",
            name: "Gestor Mobile Demo", email: "gestor@usina.com",
            role: "GESTOR_MOBILE",
          },
        ];

        for (const u of users) {
          await write("users", u.id, {
            name:       u.name,
            email:      u.email,
            unit_id:    "unit_001",
            role:       u.role,
            is_active:  true,
            created_at: now(),
            updated_at: now(),
          });
        }

        // ══════════════════════════════════════════════════════════
        // CONCLUÍDO
        // ══════════════════════════════════════════════════════════
        log("\n🎉 SEED CONCLUÍDO COM SUCESSO!", "done");
        log("Acesse o Console do Firebase para conferir os dados.", "done");
        log("Próximo passo: Etapa 2 — Cloud Functions", "done");

      } catch (err) {
        log(`\n❌ ERRO: ${err.message}`, "err");
        log("Verifique as Security Rules ou se o usuário admin existe no Auth.", "err");
        console.error(err);
      }

      btn.disabled = false;
    }

    // Expõe para o onclick do botão (escopo global)
    window.runSeed = runSeed;
  </script>
</body>
</html>
