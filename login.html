<script>
    $(function() {
        var checkSession = function (onFinish) {
            console.log("check session...");
            $.ajax({
                url: "/Login/CheckSession",
                success: function(data)
                {
                    console.log("\tLogged -> " + data.Logged);
                    if (data.Logged) {
                        onFinish(true);
                        $internalLoginOverlay.hideLoadingOverlay(false, 600, function() {
                            console.log("Usuário logado novamente!")
                        });
                    }
                    else
                        onFinish(false);
                },
                error:function() {
                    onFinish(false);
                }
            });
        }

        var checkSessionLocked = function() {
            setTimeout(function() {
                checkSession(function (success) {
                    if (!success)
                        checkSessionLocked();
                });
            }, 7000);
        };

        if (location.pathname != '/Login')
            checkSessionLocked();
    });
</script>
